<!DOCTYPE html>
<html>
<head><title>Upload Video</title></head>
<body style="background:#0f0f0f; color:white; font-family:Arial; padding:50px;">
    <h1>Upload Video to StreamHub</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Video Title" required style="padding:10px; width:300px; margin:10px 0; background:#333; color:white; border:none;"><br>
        <input type="file" name="video" accept="video/mp4" required style="margin:10px 0;"><br>
        <button type="submit" style="padding:10px 20px; background:red; color:white; border:none; border-radius:5px; cursor:pointer;">Upload</button>
    </form>
    <br><a href="/" style="color:white;">← Back to Home</a>
</body>
</html>
